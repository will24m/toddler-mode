<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toddler Mode — Settings</title>
    <style>
      :root {
        --orange: #ff9a6b;
        --orange-dark: #ff8654;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px 60px;
        color: #1b1b1b;
        background: #fff;
      }
      h1 {
        font-size: 22px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      p.sub {
        color: #555;
        margin-top: -6px;
        font-size: 14px;
      }
      .field {
        margin: 18px 0;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 6px;
      }
      .hint {
        font-weight: 400;
        color: #777;
        font-size: 12px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--orange);
        box-shadow: 0 0 0 3px rgba(255, 154, 107, 0.25);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 20px;
      }
      button#save {
        background: var(--orange);
        color: #fff;
        border: none;
        padding: 11px 22px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button#save:hover {
        background: var(--orange-dark);
      }
      #status {
        color: #2e7d32;
        font-size: 14px;
        font-weight: 600;
      }
      .key-row {
        display: flex;
        gap: 8px;
      }
      .key-row button {
        flex: 0 0 auto;
        padding: 0 12px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      .note {
        margin-top: 24px;
        padding: 12px 14px;
        background: #fff7ef;
        border: 1px solid #ffe0c2;
        border-radius: 10px;
        font-size: 13px;
        color: #6b4a2b;
      }
    </style>
  </head>
  <body>
    <h1>🧸 Toddler Mode</h1>
    <p class="sub">Pick an AI, paste your key, and start getting baby-simple summaries.</p>

    <div class="field">
      <label for="provider">AI provider</label>
      <select id="provider">
        <option value="openai">OpenAI (or any OpenAI-compatible)</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="custom">Custom endpoint</option>
      </select>
    </div>

    <div class="field">
      <label for="endpoint">API endpoint <span class="hint">— the full URL to call</span></label>
      <input type="text" id="endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
    </div>

    <div class="field">
      <label for="apiKey">API key <span class="hint">— stored locally on this device only</span></label>
      <div class="key-row">
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
        <button type="button" id="toggleKey">Show</button>
      </div>
    </div>

    <div class="field">
      <label for="model">Model</label>
      <input type="text" id="model" placeholder="gpt-4o-mini" />
    </div>

    <div class="row">
      <button id="save">Save settings</button>
      <span id="status"></span>
    </div>

    <div class="note">
      Your API key lives in this browser's local storage and is sent only to the endpoint above.
      Provider, endpoint, and model sync across your signed-in browsers; the key never does.
    </div>

    <script src="options.js"></script>
  </body>
</html>
